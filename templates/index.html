<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataPulse | Smart Data Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-wrapper">
        <header class="app-header">
            <div class="brand">
                <h1 class="logo-text">DataPulse</h1>
                <p class="tagline">Intelligent Data Assistant</p>
            </div>
            <div class="status-pill">
                <span class="dot"></span> Live Data
            </div>
        </header>

        <main id="chat-window">
            <div class="message-group assistant">
                <div class="msg-avatar">
                   <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"></path><rect x="4" y="8" width="16" height="12" rx="2"></rect><path d="M2 14h2"></path><path d="M20 14h2"></path><path d="M15 13v2"></path><path d="M9 13v2"></path></svg>
                </div>
                <div class="msg-content">
                    <p>Hi! I'm your **DataPulse Assistant**. Ready to help you analyze your spreadsheets or manage your calendar. What's on your mind? 👋</p>
                </div>
            </div>
        </main>

        <section class="controls">
            <div class="quick-actions">
                <button class="action-chip" onclick="handleSuggestion('Summarize my sales data')">📊 Summary</button>
                <button class="action-chip" onclick="handleSuggestion('Show me the regional breakdown')">🗺️ Regions</button>
                <button class="action-chip" onclick="handleSuggestion('What is the top performing category?')">🛍️ Top Category</button>
                <button class="action-chip" onclick="handleSuggestion('Find the highest revenue deals')">💰 High Revenue</button>
                <button class="action-chip" onclick="handleSuggestion('Set a reminder to review data')">⏰ Reminder</button>
                <button class="action-chip" onclick="handleSuggestion('What are the current growth trends?')">📈 Trends</button>
            </div>
            <div class="input-area">
                <input type="text" id="user-input" placeholder="Ask anything about your data..." autocomplete="off">
                <button id="send-btn" title="Send message">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
            <p class="legal-text">Powered by Google Gemini & Sheets</p>
        </section>
    </div>

    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
